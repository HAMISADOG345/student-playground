    <style>
        :root {
            
            --primary:
            --primary-hover:
            --text: #f1f5f9;
            --bg: #0f172a;
            --text-muted: #94a3b8;
            --surface: #1e293b;
            --border: #334155;
            --radius: 12px;
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.6), 0 4px 6px -4px rgb(0 0 0 / 0.6);
            --gradient-primary: linear-gradient(135deg, #263247 0%, #263247 100%);
        }

        .win-instance {
            position: absolute;
            z-index: 999;
            background-color: var(--bg, #fff);
            border: 3px solid var(--border, #0078d4);
            width: 1000px;
            border-radius: 12px;
            box-shadow: 5px 5px 0px var(--surface, #ccc);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .win-instance.dragging {
            transition: none !important;
        }

        .window-header {
            padding: 8px 12px;
            cursor: move;
            background-color: var(--surface);
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            user-select: none;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .control-btn {
            cursor: pointer;
            font-family: monospace;
            font-size: 18px;
        }

        .content-area {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .Container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .card {
            background: var(--bg);
            padding: 15px;
            text-decoration: none;
            color: var(--text-muted);
            text-shadow: 3px 3px 0px var(--border);
            border-radius: 8px;
            text-align: center;
            border: 2px solid var(--border);
            transition: transform 0.1s;
            box-shadow: 3px 3px 0px var(--surface);
        }

        .card:hover {
            transform: scale(1.03);
            border-color: var(--border);
        }

        .card h1 { 
            font-size: 14px; 
            margin: 0; 
        }
    </style>

    <style id="drifterCSS">
        .bg-drift-container {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            pointer-events: none;

        .drifting-text-layer {
            transform: rotate(-25deg);
            display: flex;
            flex-direction: column;
            gap: 40px;

        .line {
            font-size: 5rem;
            font-weight: 900;

            white-space: nowrap;
            text-transform: uppercase;

            text-shadow: -10px -10px 0px var(--border);
        }

        .line:nth-child(even) {
            margin-left: -1500px;
        }

        @keyframes driftDiagonal {
            from { transform: rotate(-25deg) translate(0, 0); }
            to { transform: rotate(-25deg) translate(1000px, 1000px); }
        }

            let currentQuote = "";

            let isDeleting = false;
            let isWaiting = false;

            function getRandomQuote() {
                return quotes[Math.floor(Math.random() * quotes.length)];
            }

            currentQuote = getRandomQuote();

            function typeEffect() {
                if (isDeleting) {
                currentQuote="|"
                typingElement.textContent = currentQuote.substring(0, charIndex - 1);
                charIndex--;
                } else {
                typingElement.textContent = currentQuote.substring(0, charIndex + 1);
                charIndex++;
                }

                if (!isDeleting && charIndex === currentQuote.length) {
                isWaiting = true;
                setTimeout(() => {
                    isDeleting = true;
                    isWaiting = false;
                    typeEffect();
                }, 2000);
                return;
                } else if (isDeleting && charIndex === 1) {
                isDeleting = false;

                let newQuote;
                do {
                    newQuote = getRandomQuote();
                    if (newQuote = currentQuote){
                        newQuote = getRandomQuote();
                    }
                } while (newQuote === currentQuote && quotes.length > 2);

                currentQuote = newQuote;
                setTimeout(typeEffect, 500);
                return;
                }

                const speed = isDeleting ? 50 : 100;
                setTimeout(typeEffect, speed);
            }

            setTimeout(typeEffect, 100);
        };

    <script>
        function toggleMaximize(win) {
            if (win.dataset.isMaximized !== "true") {
                // Save current state to dataset memory
                win.dataset.oldTop = win.style.top;
                win.dataset.oldLeft = win.style.left;
                win.dataset.oldWidth = win.style.width;
                win.dataset.oldHeight = win.style.height;
                win.dataset.oldTransform = win.style.transform;
                win.dataset.oldRadius = win.style.borderRadius;

                win.style.top = "0px";
                win.style.left = "0px";
                win.style.width = "100vw";
                win.style.height = "100vh";
                win.style.transform = "none";
                win.style.borderRadius = "0px";
                
                win.dataset.isMaximized = "true";

            } else {
                win.style.top = win.dataset.oldTop;
                win.style.left = win.dataset.oldLeft;
                win.style.width = win.dataset.oldWidth;
                win.style.height = win.dataset.oldHeight;
                win.style.transform = win.dataset.oldTransform;
                win.style.borderRadius = win.dataset.oldRadius;

                win.dataset.isMaximized = "false";
            }
        }

        function dragElement(elmnt) {
            let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
            const header = document.getElementById(elmnt.id + "Header");

            header.onmousedown = (e) => {
                if (elmnt.dataset.isMaximized === "true") return;

                elmnt.classList.add('dragging');

                if (elmnt.style.transform !== "none") {
                    const rect = elmnt.getBoundingClientRect();
                    elmnt.style.transform = "none";
                    elmnt.style.top = rect.top + "px";
                    elmnt.style.left = rect.left + "px";
                }

                p3 = e.clientX;
                p4 = e.clientY;

                document.onmouseup = () => {
                    elmnt.classList.remove('dragging');
                    document.onmouseup = null;
                    document.onmousemove = null;
                };

                document.onmousemove = (e) => {
                    p1 = p3 - e.clientX;
                    p2 = p4 - e.clientY;
                    p3 = e.clientX;
                    p4 = e.clientY;
                    elmnt.style.top = (elmnt.offsetTop - p2) + "px";
                    elmnt.style.left = (elmnt.offsetLeft - p1) + "px";
                };
            };
        }
    </script>
